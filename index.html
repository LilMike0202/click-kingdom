<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click Kingdom</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0d1a;
    --surface:   #13132a;
    --border:    #2a2a4a;
    --gold:      #f0c040;
    --gold-dim:  #a07820;
    --silver:    #c0c8d8;
    --bronze:    #cd7f32;
    --accent:    #7c5cbf;
    --text:      #e8e4f0;
    --muted:     #7070a0;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 60px;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 36px;
  }
  header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 6vw, 3.4rem);
    font-weight: 900;
    letter-spacing: .04em;
    background: linear-gradient(135deg, #f0c040 0%, #fff0a0 50%, #c08020 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }
  header p {
    margin-top: 8px;
    color: var(--muted);
    font-size: .95rem;
    letter-spacing: .02em;
  }

  /* ── Auth bar ── */
  #auth-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    min-height: 40px;
  }
  #user-info {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: .9rem;
    color: var(--silver);
  }
  #user-info img {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid var(--gold-dim);
  }

  .btn {
    font-family: 'Inter', sans-serif;
    font-size: .85rem;
    font-weight: 600;
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .btn:hover { opacity: .85; }
  .btn:active { transform: scale(.97); }
  .btn-ghost {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-github {
    background: #24292e;
    color: white;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Score panel ── */
  #score-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 40px;
    text-align: center;
    margin-bottom: 28px;
    min-width: 260px;
  }
  #score-panel .label {
    font-size: .78rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  #score-display {
    font-family: 'Cinzel', serif;
    font-size: clamp(3rem, 10vw, 5rem);
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
    transition: transform .08s;
  }
  #score-display.bump {
    transform: scale(1.12);
  }
  .month-score-row {
    margin-top: 10px;
    font-size: .82rem;
    color: var(--muted);
  }
  .month-score-row span {
    color: var(--silver);
    font-weight: 600;
  }

  /* ── Click button ── */
  #click-btn {
    font-family: 'Cinzel', serif;
    font-size: 1.5rem;
    font-weight: 700;
    padding: 22px 56px;
    background: linear-gradient(135deg, #8060d0, #5030a0);
    color: white;
    border: none;
    border-radius: 18px;
    cursor: pointer;
    box-shadow: 0 8px 32px #5030a060;
    transition: transform .1s, box-shadow .1s;
    position: relative;
    overflow: hidden;
    margin-bottom: 36px;
    user-select: none;
  }
  #click-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px #5030a080;
  }
  #click-btn:active {
    transform: translateY(1px) scale(.97);
    box-shadow: 0 4px 16px #5030a060;
  }
  #click-btn:disabled {
    opacity: .4;
    cursor: not-allowed;
    transform: none;
  }

  /* ── Float +1 animation ── */
  .float-point {
    position: fixed;
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 1.5rem;
    color: var(--gold);
    pointer-events: none;
    animation: floatUp .7s ease-out forwards;
    z-index: 999;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
  }

  /* ── Leaderboard ── */
  #leaderboard-section {
    width: 100%;
    max-width: 640px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: .05em;
  }
  .month-badge {
    font-size: .75rem;
    background: var(--accent);
    color: white;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: .04em;
  }

  .board-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .tab-btn {
    font-family: 'Inter', sans-serif;
    font-size: .82rem;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  #leaderboard-table {
    width: 100%;
    border-collapse: collapse;
  }
  #leaderboard-table th {
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }
  #leaderboard-table th:last-child { text-align: right; }

  #leaderboard-table td {
    padding: 11px 12px;
    border-bottom: 1px solid #1e1e38;
    font-size: .9rem;
    vertical-align: middle;
  }
  #leaderboard-table td:last-child { text-align: right; }

  .rank-cell {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: .85rem;
    color: var(--muted);
    width: 36px;
  }
  .rank-1 { color: var(--gold); }
  .rank-2 { color: var(--silver); }
  .rank-3 { color: var(--bronze); }

  .player-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .player-cell img {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border);
  }
  .player-cell .avatar-placeholder {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .7rem;
    font-weight: 700;
    color: white;
  }
  .me-tag {
    font-size: .68rem;
    background: var(--accent);
    color: white;
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 600;
    margin-left: 4px;
  }

  .score-cell {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--gold);
  }

  tr.highlight-me td {
    background: #1e1a3a;
  }

  #leaderboard-empty {
    text-align: center;
    color: var(--muted);
    padding: 32px;
    font-size: .9rem;
  }

  #loading-overlay {
    color: var(--muted);
    font-size: .85rem;
    padding: 20px;
    text-align: center;
  }

  /* ── Footer ── */
  footer {
    margin-top: 48px;
    text-align: center;
    color: var(--muted);
    font-size: .78rem;
    line-height: 1.8;
  }

  @media (max-width: 480px) {
    #click-btn { padding: 18px 36px; font-size: 1.2rem; }
    #score-panel { padding: 20px 24px; }
  }
</style>
</head>
<body>

<header>
  <h1>👑 Click Kingdom</h1>
  <p>Click to conquer. Rise to the throne.</p>
</header>

<!-- Auth -->
<div id="auth-bar">
  <button class="btn btn-github" id="login-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577v-2.165c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.84 1.237 1.84 1.237 1.07 1.834 2.807 1.304 3.492.997.108-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
    Login with GitHub
  </button>
  <div id="user-info" style="display:none">
    <img id="user-avatar" src="" alt="">
    <span id="user-name"></span>
    <button class="btn btn-ghost" id="logout-btn">Logout</button>
  </div>
</div>

<!-- Score -->
<div id="score-panel">
  <div class="label">Your Total Score</div>
  <div id="score-display">0</div>
  <div class="month-score-row">This month: <span id="month-score-display">0</span> pts</div>
</div>

<!-- Click button -->
<button id="click-btn" disabled>👑 Click to Earn</button>

<!-- Leaderboard -->
<section id="leaderboard-section">
  <div class="section-header">
    <span class="section-title">🏆 Leaderboard</span>
    <span class="month-badge" id="month-label"></span>
  </div>

  <div class="board-tabs">
    <button class="tab-btn active" id="tab-monthly" onclick="switchTab('monthly')">This Month</button>
    <button class="tab-btn" id="tab-alltime" onclick="switchTab('alltime')">All Time</button>
  </div>

  <div id="loading-overlay">Loading leaderboard…</div>
  <table id="leaderboard-table" style="display:none">
    <thead>
      <tr>
        <th>#</th>
        <th>Player</th>
        <th>Score</th>
      </tr>
    </thead>
    <tbody id="leaderboard-body"></tbody>
  </table>
  <div id="leaderboard-empty" style="display:none">No scores yet. Be the first to click!</div>
</section>

<footer>
  🏆 Monthly champion receives a congratulatory email.<br>
  👑 Three months in a row = King of Click
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script>
// ── State ──────────────────────────────────────────
let currentUser = null;
let totalScore = 0;
let monthScore = 0;
let currentTab = 'monthly';
const currentMonth = new Date().toISOString().slice(0, 7); // "2026-06"

// ── DOM refs ───────────────────────────────────────
const scoreDisplay    = document.getElementById('score-display');
const monthScoreDisp  = document.getElementById('month-score-display');
const clickBtn        = document.getElementById('click-btn');
const loginBtn        = document.getElementById('login-btn');
const logoutBtn       = document.getElementById('logout-btn');
const userInfoEl      = document.getElementById('user-info');
const userAvatarEl    = document.getElementById('user-avatar');
const userNameEl      = document.getElementById('user-name');
const lbBody          = document.getElementById('leaderboard-body');
const lbTable         = document.getElementById('leaderboard-table');
const lbEmpty         = document.getElementById('leaderboard-empty');
const loadingEl       = document.getElementById('loading-overlay');
const monthLabel      = document.getElementById('month-label');

// ── Month label ────────────────────────────────────
const d = new Date();
monthLabel.textContent = d.toLocaleString('default', { month: 'long', year: 'numeric' });

// ── Auth ───────────────────────────────────────────
loginBtn.addEventListener('click', async () => {
  await supabaseClient.auth.signInWithOAuth({
    provider: 'github',
    options: { redirectTo: 'https://click-kingdom.vercel.app' }
  });
});

logoutBtn.addEventListener('click', async () => {
  await supabaseClient.auth.signOut();
  location.reload();
});

// ── Session init ───────────────────────────────────
async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) {
    await onLogin(session.user);
  } else {
    loadLeaderboard();
  }
}

async function onLogin(user) {
  currentUser = user;
  const meta = user.user_metadata;

  // Show user info
  userInfoEl.style.display = 'flex';
  loginBtn.style.display = 'none';
  userAvatarEl.src = meta.avatar_url || '';
  userNameEl.textContent = meta.full_name || meta.user_name || meta.name || 'Player';

  // Upsert player row
  await supabaseClient.from('scores').upsert({
    user_id: user.id,
    username: meta.full_name || meta.user_name || meta.name || 'Player',
    avatar_url: meta.avatar_url || '',
    updated_at: new Date().toISOString()
  }, { onConflict: 'user_id', ignoreDuplicates: false });

  // Load existing scores
  const { data: row } = await supabaseClient
    .from('scores').select('total_score').eq('user_id', user.id).single();
  if (row) { totalScore = row.total_score || 0; }

  const { data: mrow } = await supabaseClient
    .from('monthly_scores').select('score')
    .eq('user_id', user.id).eq('month', currentMonth).single();
  if (mrow) { monthScore = mrow.score || 0; }

  updateScoreUI();
  clickBtn.disabled = false;
  loadLeaderboard();
}

// ── Click handler ──────────────────────────────────
let saveTimeout = null;

clickBtn.addEventListener('click', (e) => {
  if (!currentUser) return;
  totalScore++;
  monthScore++;
  updateScoreUI();
  spawnFloat(e);

  // Debounce DB save (every 500ms)
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveScores, 500);
});

function updateScoreUI() {
  scoreDisplay.textContent = totalScore.toLocaleString();
  monthScoreDisp.textContent = monthScore.toLocaleString();
  scoreDisplay.classList.remove('bump');
  void scoreDisplay.offsetWidth; // reflow
  scoreDisplay.classList.add('bump');
}

async function saveScores() {
  if (!currentUser) return;
  const userId = currentUser.id;
  const meta = currentUser.user_metadata;

  await supabaseClient.from('scores').upsert({
    user_id: userId,
    username: meta.full_name || meta.user_name || meta.name || 'Player',
    avatar_url: meta.avatar_url || '',
    total_score: totalScore,
    updated_at: new Date().toISOString()
  }, { onConflict: 'user_id' });

  await supabaseClient.from('monthly_scores').upsert({
    user_id: userId,
    username: meta.full_name || meta.user_name || meta.name || 'Player',
    avatar_url: meta.avatar_url || '',
    score: monthScore,
    month: currentMonth,
    updated_at: new Date().toISOString()
  }, { onConflict: 'user_id,month' });

  loadLeaderboard();
}

// ── Float +1 ───────────────────────────────────────
function spawnFloat(e) {
  const el = document.createElement('div');
  el.className = 'float-point';
  el.textContent = '+1';
  el.style.left = e.clientX - 10 + 'px';
  el.style.top  = e.clientY - 10 + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 700);
}

// ── Leaderboard ────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-monthly').classList.toggle('active', tab === 'monthly');
  document.getElementById('tab-alltime').classList.toggle('active', tab === 'alltime');
  loadLeaderboard();
}

async function loadLeaderboard() {
  lbTable.style.display = 'none';
  lbEmpty.style.display = 'none';
  loadingEl.style.display = 'block';

  let rows = [];
  if (currentTab === 'monthly') {
    const { data } = await supabaseClient
      .from('monthly_scores')
      .select('user_id, username, avatar_url, score')
      .eq('month', currentMonth)
      .order('score', { ascending: false })
      .limit(100);
    rows = data || [];
  } else {
    const { data } = await supabaseClient
      .from('scores')
      .select('user_id, username, avatar_url, total_score')
      .order('total_score', { ascending: false })
      .limit(100);
    rows = (data || []).map(r => ({ ...r, score: r.total_score }));
  }

  loadingEl.style.display = 'none';

  if (!rows.length) {
    lbEmpty.style.display = 'block';
    return;
  }

  lbBody.innerHTML = rows.map((r, i) => {
    const rank = i + 1;
    const isMe = currentUser && r.user_id === currentUser.id;
    const rankClass = rank <= 3 ? `rank-${rank}` : '';
    const avatar = r.avatar_url
      ? `<img src="${r.avatar_url}" alt="">`
      : `<div class="avatar-placeholder">${(r.username || '?')[0].toUpperCase()}</div>`;
    const meBadge = isMe ? `<span class="me-tag">you</span>` : '';
    return `
      <tr class="${isMe ? 'highlight-me' : ''}">
        <td class="rank-cell ${rankClass}">${rank === 1 ? '👑' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank}</td>
        <td><div class="player-cell">${avatar}<span>${escHtml(r.username || 'Player')}${meBadge}</span></div></td>
        <td class="score-cell">${Number(r.score || 0).toLocaleString()}</td>
      </tr>`;
  }).join('');

  lbTable.style.display = 'table';
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
</body>
</html>
